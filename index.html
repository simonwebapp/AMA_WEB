<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alle mot Alle - Gull-versjon</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Laster inn fonten lokalt fra PCen din */
        @font-face {
            font-family: 'Avenir';
            src: url('avenir.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Lexend Deca';
            src: url('LexendDeca-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        :root {
            --gold-grad: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --dark-blue-base: #050a18;
        }

        body {
            background-color: #000;
            color: #fcf6ba;
            font-family: 'Avenir', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .oswald { font-family: 'Avenir', sans-serif !important; }
        .font-inter { font-family: 'Avenir', sans-serif !important; }

        #app-viewport {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: radial-gradient(circle at center, #0a1631 0%, var(--dark-blue-base) 100%);
            background-size: 200% 200%;
            animation: bgMove 25s ease infinite;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #particles-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .gold-text {
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            text-transform: uppercase;
            caret-color: #fcf6ba;
        }

        #setup-overlay {
            position: absolute;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 2.5vw;
            transition: opacity 0.5s ease;
        }

        #setup-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8vw;
            width: 86%;
            margin-bottom: 2vw;
        }

        #film-roll {
            display: none; 
            opacity: 0;
            height: 100%;
            width: 800%;
            transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.5s ease;
            will-change: transform;
            z-index: 2;
        }

        .frame {
            flex: 0 0 12.5%;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            container-type: inline-size; 
        }

        #grid-frame {
            position: relative;
        }

        .big-text, .card-label {
            font-size: var(--font-size, 8.5cqw);
            line-height: 1.1;
            letter-spacing: -0.01em;
            text-align: center;
            white-space: pre-wrap;
            width: 90%;
            outline: none;
            position: relative;
            z-index: 5;
            filter: drop-shadow(0 0.2vw 0.5vw rgba(0,0,0,0.9));
        }

        .card-label.editable {
            cursor: text;
        }

        #grid-view-inner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2vw;
            width: 88%;
            position: static;
        }

        .card-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: static;
        }

        .category-card {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
            container-type: inline-size; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        top 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        left 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        width 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .card-front, .card-back {
            position: absolute;
            inset: 0;
            background-color: transparent;
            display: flex;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* --- LEVENDE GULLRAMME --- */
        .card-front::before, .card-back::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 0.3vw; 
            background: var(--gold-grad);
            background-size: 200% 200%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: padding 0.6s ease;
            animation: goldTextureFlow 6s ease-in-out infinite;
            z-index: 20; 
        }

        @keyframes goldTextureFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-front {
            justify-content: center;
            align-items: center;
            opacity: 1;
            z-index: 2;
        }

        .card-back {
            display: block; 
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .category-card.flipped .card-front {
            opacity: 0;
            pointer-events: none;
        }

        .category-card.flipped .card-back {
            opacity: 1;
            z-index: 3;
            pointer-events: auto;
        }

        .card-image {
            position: absolute;
            pointer-events: none;
            z-index: 0; 
            object-fit: contain;
        }

        /* --- SPM TEKST: FJERNET BOLD --- */
        .back-content {
            background: transparent;
            border: none;
            color: #fcf6ba;
            font-family: 'Lexend Deca', Arial, Helvetica, sans-serif;
            font-weight: 400 !important; /* TVINGER NORMAL VEKT */
            font-size: var(--q-font-size, 3.5cqw); 
            line-height: 1.35;
            padding: 4cqw; 
            padding-right: 7cqw; 
            width: 100%;
            height: 100%;
            outline: none;
            resize: none;
            white-space: pre-wrap;
            text-align: left;
            position: relative;
            z-index: 5;
            text-shadow: 0 0.2vw 0.5vw rgba(0,0,0,0.9), 0 0.1vw 0.2vw rgba(0,0,0,0.5);
        }

        .category-card.expanded {
            z-index: 100 !important;
            box-shadow: 0 0 150px rgba(0,0,0,1);
        }

        .category-card.expanded .card-front::before,
        .category-card.expanded .card-back::before {
            padding: 0.8vw; 
        }

        .category-card.is-closing {
            z-index: 100 !important;
        }

        .grid-dimmed .card-wrapper .category-card:not(.expanded):not(.is-closing) {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .category-card.used {
            opacity: 0.3;
            pointer-events: none;
        }

        .category-card.used .card-front::before,
        .category-card.used .card-back::before {
            background: transparent;
            border: 0.15vw solid rgba(191, 149, 63, 0.5);
            -webkit-mask: none;
            mask-composite: none;
            padding: 0;
            animation: none;
        }
        
        .category-card.used .card-label,
        .category-card.used .back-content,
        .category-card.used .card-image { 
            opacity: 0 !important; 
            visibility: hidden !important;
        }

        .flip-emblem {
            position: absolute;
            top: 0.8vw;
            right: 0.8vw;
            height: 2.2vw;
            padding: 0 1vw;
            background: rgba(191, 149, 63, 0.15);
            border: 1px solid rgba(191, 149, 63, 0.5);
            border-radius: 1.1vw; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4vw;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 20;
        }
        .flip-emblem:hover {
            background: rgba(191, 149, 63, 0.6);
            transform: scale(1.05);
        }
        .flip-emblem svg {
            width: 1.2vw;
            height: 1.2vw;
            stroke: #fcf6ba;
        }
        .flip-emblem span {
            font-family: 'Avenir', sans-serif;
            font-size: 0.75vw;
            font-weight: 700;
            color: #fcf6ba;
            letter-spacing: 0.05em;
            margin-top: 0.1vw;
        }

        .font-controls {
            position: absolute;
            bottom: 0.8vw;
            right: 0.8vw;
            height: 2.2vw;
            padding: 0 0.6vw;
            background: rgba(191, 149, 63, 0.15);
            border: 1px solid rgba(191, 149, 63, 0.5);
            border-radius: 1.1vw; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4vw;
            z-index: 20;
        }
        .font-controls button {
            color: #fcf6ba;
            font-size: 1.2vw;
            font-weight: bold;
            cursor: pointer;
            width: 1.5vw;
            height: 1.5vw;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            background: rgba(0,0,0,0.3);
            border: none;
            outline: none;
        }
        .font-controls button:hover {
            background: rgba(191, 149, 63, 0.8);
        }
        .font-controls span {
            font-family: 'Avenir', sans-serif;
            font-size: 0.8vw;
            color: #fcf6ba;
            min-width: 1.5vw;
            text-align: center;
            font-weight: 700;
            margin-top: 0.1vw;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.8); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(191, 149, 63, 0.8); }
    </style>
</head>
<body>

    <audio id="pling-audio" src="pling.wav" preload="auto"></audio>

    <div id="app-viewport">
        <canvas id="particles-canvas"></canvas>
        
        <div id="setup-overlay">
            <h2 class="oswald text-[2.8vw] gold-text mb-[1.5vw]">OPPSETT AV SKJERMER</h2>
            <div id="setup-grid"></div>
            
            <div class="absolute bottom-0 left-0 w-full px-[3vw] pb-[2vw] flex justify-between items-end pointer-events-none z-[1000]">
                
                <div class="text-left text-white/80 font-inter text-[0.85vw] leading-[1.5] pointer-events-auto bg-black/60 p-[1vw] px-[1.5vw] rounded-xl border border-yellow-600/30 backdrop-blur-sm max-w-[65%]">
                    <h3 class="oswald text-[1.1vw] text-[#fcf6ba] mb-[0.5vw] tracking-wider uppercase font-bold">HVORDAN AVVIKLE:</h3>
                    <ul class="grid grid-cols-2 gap-x-[3vw] gap-y-[0.3vw] list-disc ml-[1.5vw] opacity-90">
                        <li><span class="text-[#bf953f] font-bold">▶ / ◀ :</span> Bla i introen</li>
                        <li><span class="text-[#bf953f] font-bold">1 - 6 :</span> Åpne / lukke kategori</li>
                        <li><span class="text-[#bf953f] font-bold">SPACE :</span> Vise / skjule spørsmål</li>
                        <li><span class="text-[#bf953f] font-bold">Shift + 1-6:</span> Angre kryss på kategori</li>
                        <li><span class="text-[#bf953f] font-bold">ESC :</span> Lukk uten å krysse av</li>
                        <li><span class="text-[#bf953f] font-bold">R :</span> Nullstill hele brettet</li>
                    </ul>
                </div>

                <div class="flex flex-col items-end gap-[1vw] pointer-events-auto">
                    <button onclick="startApp()" class="oswald px-[3vw] py-[1.2vw] bg-yellow-500 text-black font-black text-[1.4vw] rounded-xl hover:scale-105 transition-transform shadow-[0_0_30px_rgba(250,204,21,0.5)]">LAGRE OG KJØR</button>
                </div>
            </div>
        </div>

        <div id="film-roll">
            <div class="frame" id="slide-logo">
                <div style="width: 48vw; height: 31.375vw;" class="flex items-center justify-center relative">
                     <img id="main-logo-img" src="logo.png" alt="Logo" style="max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(191,149,63,0.3));" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
                     
                     <span id="logo-fallback" class="oswald text-4xl gold-text text-center" style="display: none; border: 0.3vw dashed #bf953f; padding: 3vw; border-radius: 24px;">
                        MANGLER BILDE<br><span id="logo-fallback-text" class="text-[1.5vw] text-white/50">Kunne ikke finne 'logo.png' i mappen!</span>
                     </span>
                </div>
            </div>
            
            <div class="frame" id="grid-frame">
                <div id="grid-view-inner">
                    <div id="grid-container"></div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // --- STANDARD INNHOLD: SPM 2 VASKET FOR "ELLER"-DELEN ---
        let categories = [
            { 
                id: 1, 
                text: "DEN VANSKELIGSTE\nJOBBEN I NORSK TV", 
                qText: "1. Hva har disse tre personene til felles?\n\n2. Hva heter LO-lederen i dag?\n\n3. Hvem står bak denne kjærlighetssangen?\n\n4. Hva het debattprogrammet som delte navn med en duelltype?",
                showImage: false, imageSrc: "bilde1.png", 
                imageStyle: "width: 60%; height: 60%; top: 50%; left: 50%; transform: translate(-50%, -50%);",
                fontSize: "7cqw",
                qFontSize: "3cqw"
            },
            { 
                id: 2, 
                text: "ETTER 24 SESONGER\nSLITER JEG IKKE LENGER\nMED Å TRU AT NOKON\nKUNNE BU DER", 
                qText: "1. Hva heter duoen bak låta?\n\n2. Hvilke to ord ble alltid sagt på slutten av “Trygdekontoret”?\n\n3. Hva kalles det når kvinner opptar en ekstra sitteplass med vesken sin?\n\n4. Hva heter briten som ble landskjent for sin opptreden i “Der ingen skulle tru at nokon kunne bu”?",
                showImage: false, imageSrc: "bilde2.png",
                imageStyle: "width: 60%; height: 60%; top: 50%; left: 50%; transform: translate(-50%, -50%);",
                fontSize: "6cqw",
                qFontSize: "3cqw"
            },
            { 
                id: 3, 
                text: "OPPA\nGANGFELT\nSTYLE", 
                qText: "1. Hvilket råd fikk Morten Abel av Kristoffer Hivju under leseprøvene til serien Mord i Sogn?\n\n2. Hvem var trekkplasteret til MAGAs eget Superbowl-pauseshow?\n\n3. Si én som har vært redaktør for tidsskriftet Fett.\n\n4. Hva heter det mest kjente kvartalet i New Orleans?",
                showImage: false, imageSrc: "bilde3.png",
                imageStyle: "width: 60%; height: 60%; top: 50%; left: 50%; transform: translate(-50%, -50%);",
                fontSize: "8.5cqw",
                qFontSize: "3cqw" 
            },
            { 
                id: 4, 
                text: "JA TIL FRED,\nMEN LITT KRIG ER GREIT,\nSÅ LENGE JEG FÅR SE\nMER TIL PALLE YDSTEBØ", 
                qText: "1. I hvilket år startet Norges union med Sverige?\n\n2. Hvilket land slo ut Norge i fotball-VM i 1998?\n\n3. Hvor befinner du deg hvis du dorger?\n\n4. Hvilket nummer assosierer vi med soldat August Stomperud?",
                showImage: false, imageSrc: "bilde4.png",
                imageStyle: "width: 60%; height: 60%; top: 50%; left: 50%; transform: translate(-50%, -50%);",
                fontSize: "6cqw",
                qFontSize: "3cqw" 
            },
            { 
                id: 5, 
                text: "", 
                qText: "1. Hadde Kåre Willoch hår på toppen av hodet da Jon Almaas ble født?\n\n2. Hva var spesielt med Àngela Ponces deltakelse i Miss Universe i 2018?\n\n3. Hvem ble David Harbour skilt fra i 2025?\n\n4. Hvilket land ligger på den andre siden av Gibraltarstredet?",
                showImage: true, imageSrc: "1332_K6_Jon gigapenis.png",
                imageStyle: "width: 103%; height: 103%; top: 50%; left: 50%; transform: translate(-50%, -50%);",
                fontSize: "7cqw",
                qFontSize: "3cqw" 
            },
            { 
                id: 6, 
                text: "DEN UBEHAGELIGE\n GJETTELEKEN SOM\nOPPSTÅR NÅR DU HAR\nVASKET HENDENE PÅ ET\nFREMMED BAD OG MÅ\nVELGE HVILKET HÅNDKLE\nDU SKAL BRUKE", 
                qText: "1. Under hvilket artistnavn lager Kevin Parker musikk?\n\n2. Hva kalles massen som brukes til å binde sammen mursteiner?\n\n3. Hva heter animasjonsserien til Steinar Klouman Hallert og Erlend Mørch?\n\n4. Hva heter treningsøvelsen Jon demonstrerte?",
                showImage: false, imageSrc: "bilde6.png",
                imageStyle: "width: 60%; height: 60%; top: 50%; left: 50%; transform: translate(-50%, -50%);",
                fontSize: "5.5cqw",
                qFontSize: "3cqw" 
            }
        ];

        let currentSlide = 0; 
        let expandedId = null;
        let usedCategories = new Set();

        const STORAGE_KEY = 'alleMotAlleData_FINAL_v26';

        const setupOverlay = document.getElementById('setup-overlay');
        const setupGrid = document.getElementById('setup-grid');
        const roll = document.getElementById('film-roll');
        const gridContainer = document.getElementById('grid-container');
        const frame = document.getElementById('grid-frame');

        const flipIconSVG = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8m0 0V3m0 5h5"></path></svg>';

        function playPling() {
            const audio = document.getElementById('pling-audio');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Krever klikk på skjermen for å spille lyd.', e));
            }
        }

        function createFlipEmblem(onClick, btnText) {
            const btn = document.createElement('div');
            btn.className = 'flip-emblem';
            btn.innerHTML = `${flipIconSVG} <span>${btnText}</span>`;
            btn.onclick = (e) => {
                e.stopPropagation();
                onClick();
            };
            return btn;
        }

        function initSetup() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.categories) {
                        categories = categories.map(cat => {
                            const savedCat = parsed.categories.find(c => c.id === cat.id);
                            return savedCat ? { 
                                ...cat, 
                                text: savedCat.text, 
                                qText: savedCat.qText, 
                                fontSize: savedCat.fontSize,
                                qFontSize: savedCat.qFontSize
                            } : cat;
                        });
                    }
                } catch (e) {
                    console.error("Kunne ikke laste lagrede data", e);
                }
            }

            setupGrid.innerHTML = '';
            
            categories.forEach(cat => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                const card = document.createElement('div');
                card.className = 'category-card';
                const inner = document.createElement('div');
                inner.className = 'card-inner';
                const front = document.createElement('div');
                front.className = 'card-front';
                
                if (cat.showImage && cat.imageSrc) {
                    const img = document.createElement('img');
                    img.src = cat.imageSrc;
                    img.className = 'card-image';
                    img.style.cssText = cat.imageStyle; 
                    front.appendChild(img);
                }

                const label = document.createElement('span');
                label.className = 'card-label gold-text editable oswald font-bold';
                label.style.setProperty('--font-size', cat.fontSize || '8.5cqw');
                label.contentEditable = "true";
                label.spellcheck = false;
                label.innerText = cat.text;
                label.id = `setup-input-${cat.id}`;
                
                label.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                    document.execCommand('insertText', false, text.toUpperCase());
                });

                front.appendChild(label);
                front.appendChild(createFlipEmblem(() => card.classList.toggle('flipped'), 'VISE SPM'));

                const fontControls = document.createElement('div');
                fontControls.className = 'font-controls';
                let currentSize = parseFloat(cat.fontSize) || 8.5;
                const minusBtn = document.createElement('button'); minusBtn.innerText = '-';
                const plusBtn = document.createElement('button'); plusBtn.innerText = '+';
                const sizeDisplay = document.createElement('span'); sizeDisplay.innerText = currentSize.toFixed(1);
                minusBtn.onclick = (e) => { e.stopPropagation(); currentSize = Math.max(1, currentSize - 0.5); sizeDisplay.innerText = currentSize.toFixed(1); cat.fontSize = currentSize + 'cqw'; label.style.setProperty('--font-size', cat.fontSize); };
                plusBtn.onclick = (e) => { e.stopPropagation(); currentSize = Math.min(20, currentSize + 0.5); sizeDisplay.innerText = currentSize.toFixed(1); cat.fontSize = currentSize + 'cqw'; label.style.setProperty('--font-size', cat.fontSize); };
                fontControls.appendChild(minusBtn); fontControls.appendChild(sizeDisplay); fontControls.appendChild(plusBtn);
                front.appendChild(fontControls);

                const back = document.createElement('div');
                back.className = 'card-back';
                back.appendChild(createFlipEmblem(() => card.classList.toggle('flipped'), 'KATEGORI'));
                const qArea = document.createElement('textarea');
                qArea.className = 'back-content custom-scrollbar';
                qArea.placeholder = "Fyll inn kategorispørsmål her...";
                qArea.value = cat.qText || ""; 
                qArea.id = `setup-q-${cat.id}`;
                qArea.style.setProperty('--q-font-size', cat.qFontSize || '2.5cqw');
                back.appendChild(qArea);

                const qFontControls = document.createElement('div');
                qFontControls.className = 'font-controls';
                let currentQSize = parseFloat(cat.qFontSize) || 2.5;
                const qMinusBtn = document.createElement('button'); qMinusBtn.innerText = '-';
                const qPlusBtn = document.createElement('button'); qPlusBtn.innerText = '+';
                const qSizeDisplay = document.createElement('span'); qSizeDisplay.innerText = currentQSize.toFixed(1);
                qMinusBtn.onclick = (e) => { e.stopPropagation(); currentQSize = Math.max(1, currentQSize - 0.5); qSizeDisplay.innerText = currentQSize.toFixed(1); cat.qFontSize = currentQSize + 'cqw'; qArea.style.setProperty('--q-font-size', cat.qFontSize); };
                qPlusBtn.onclick = (e) => { e.stopPropagation(); currentQSize = Math.min(15, currentQSize + 0.5); qSizeDisplay.innerText = currentQSize.toFixed(1); cat.qFontSize = currentQSize + 'cqw'; qArea.style.setProperty('--q-font-size', cat.qFontSize); };
                qFontControls.appendChild(qMinusBtn); qFontControls.appendChild(qSizeDisplay); qFontControls.appendChild(qPlusBtn);
                back.appendChild(qFontControls);

                inner.appendChild(front); inner.appendChild(back); card.appendChild(inner); wrapper.appendChild(card); setupGrid.appendChild(wrapper);
            });
            initParticles();
        }

        function startApp() {
            const audio = document.getElementById('pling-audio');
            if (audio) { audio.muted = true; let playPromise = audio.play(); if (playPromise !== undefined) { playPromise.then(() => { audio.pause(); audio.currentTime = 0; audio.muted = false; }).catch(e => console.log("Lyd-hack feilet: ", e)); } }
            categories = categories.map(cat => {
                const el = document.getElementById(`setup-input-${cat.id}`);
                const qText = document.getElementById(`setup-q-${cat.id}`).value;
                const originalCat = categories.find(c => c.id === cat.id);
                return { id: cat.id, text: el.innerText.trim().toUpperCase(), qText: qText, showImage: originalCat.showImage, imageSrc: originalCat.imageSrc, imageStyle: originalCat.imageStyle, fontSize: originalCat.fontSize, qFontSize: originalCat.qFontSize };
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ categories: categories }));
            buildGame();
            setupOverlay.style.opacity = '0';
            setTimeout(() => { setupOverlay.style.display = 'none'; roll.style.display = 'flex'; roll.offsetHeight; roll.style.opacity = '1'; }, 500);
        }

        function buildGame() {
            document.querySelectorAll('.intro-slide').forEach(el => el.remove());
            gridContainer.innerHTML = '';
            categories.forEach(cat => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'frame intro-slide';
                if (cat.showImage && cat.imageSrc) { const img = document.createElement('img'); img.src = cat.imageSrc; img.className = 'card-image'; img.style.cssText = cat.imageStyle; slideDiv.appendChild(img); }
                const slideSpan = document.createElement('span');
                slideSpan.className = 'big-text oswald font-black gold-text';
                slideSpan.style.setProperty('--font-size', cat.fontSize || '8.5cqw');
                slideSpan.innerText = cat.text;
                slideDiv.appendChild(slideSpan);
                roll.insertBefore(slideDiv, frame);

                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                const card = document.createElement('div');
                card.className = 'category-card';
                card.id = `card-${cat.id}`;
                const inner = document.createElement('div');
                inner.className = 'card-inner';
                const front = document.createElement('div');
                front.className = 'card-front cursor-pointer';
                front.onclick = () => { if (!card.classList.contains('flipped')) toggleExpand(cat.id, true); };
                if (cat.showImage && cat.imageSrc) { const img = document.createElement('img'); img.src = cat.imageSrc; img.className = 'card-image'; img.style.cssText = cat.imageStyle; front.appendChild(img); }
                const label = document.createElement('span');
                label.className = 'card-label gold-text oswald font-bold pointer-events-none';
                label.style.setProperty('--font-size', cat.fontSize || '8.5cqw');
                label.innerText = cat.text;
                front.appendChild(label);
                const back = document.createElement('div');
                back.className = 'card-back';
                const qTextDisplay = document.createElement('div');
                qTextDisplay.className = 'back-content custom-scrollbar overflow-y-auto';
                qTextDisplay.innerText = cat.qText || '';
                qTextDisplay.style.setProperty('--q-font-size', cat.qFontSize || '2.5cqw');
                back.appendChild(qTextDisplay);
                inner.appendChild(front); inner.appendChild(back); card.appendChild(inner); wrapper.appendChild(card); gridContainer.appendChild(wrapper);
            });
        }

        function updateSlide() { roll.style.transform = `translateX(-${currentSlide * 12.5}%)`; }

        function morphCat6ToGrid() {
            const card6 = document.getElementById('card-6');
            const label6 = card6 ? card6.querySelector('.card-label') : null;
            if(!card6 || !label6) return;
            roll.style.transition = 'none';
            currentSlide = 7;
            for(let i=1; i<=6; i++) { const c = document.getElementById(`card-${i}`); if(c) { c.style.transition = 'none'; c.style.opacity = '0'; } }
            label6.style.transition = 'none'; label6.style.opacity = '0';
            const img6 = card6.querySelector('.card-image');
            if(img6) { img6.style.transition = 'none'; img6.style.opacity = '0'; }
            updateSlide(); 
            const ghost = document.createElement('div');
            ghost.className = 'frame'; ghost.style.position = 'absolute'; ghost.style.zIndex = '9999'; ghost.style.top = '0'; ghost.style.left = '0'; ghost.style.width = '100%'; ghost.style.height = '100%'; ghost.style.margin = '0'; ghost.style.containerType = 'inline-size'; 
            const cat6Data = categories[5];
            if (cat6Data.showImage && cat6Data.imageSrc) { const ghostImg = document.createElement('img'); ghostImg.src = cat6Data.imageSrc; ghostImg.className = 'card-image'; ghostImg.style.cssText = cat6Data.imageStyle; ghost.appendChild(ghostImg); }
            const ghostText = document.createElement('span');
            ghostText.className = 'big-text oswald font-bold gold-text';
            ghostText.style.setProperty('--font-size', cat6Data.fontSize || '8.5cqw');
            ghostText.innerText = cat6Data.text; ghost.appendChild(ghostText);
            const viewport = document.getElementById('app-viewport'); viewport.appendChild(ghost); viewport.offsetHeight;
            const targetRect = card6.getBoundingClientRect(); const viewportRect = viewport.getBoundingClientRect();
            const targetCenterX = (targetRect.left + targetRect.width / 2) - viewportRect.left;
            const targetCenterY = (targetRect.top + targetRect.height / 2) - viewportRect.top;
            const startCenterX = viewportRect.width / 2; const startCenterY = viewportRect.height / 2;
            const deltaX = targetCenterX - startCenterX; const deltaY = targetCenterY - startCenterY;
            const scale = targetRect.width / viewportRect.width;
            ghost.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            ghost.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(${scale})`;
            setTimeout(() => { for(let i=1; i<=6; i++) { const c = document.getElementById(`card-${i}`); if(c) { c.style.transition = 'opacity 0.6s ease'; c.style.opacity = '1'; } } }, 100); 
            setTimeout(() => { label6.style.opacity = ''; if(img6) img6.style.opacity = ''; ghost.remove(); for(let i=1; i<=6; i++) { const c = document.getElementById(`card-${i}`); if(c) { c.style.transition = ''; c.style.opacity = ''; } } gridContainer.classList.add('grid-wow-glow'); setTimeout(() => gridContainer.classList.remove('grid-wow-glow'), 2000); roll.style.transition = 'transform 1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.5s ease'; }, 800);
        }

        function toggleExpand(id, markAsUsed = true) {
            if (currentSlide !== 7) return;
            const card = document.getElementById(`card-${id}`);
            const frameRect = frame.getBoundingClientRect();
            if (expandedId === id) {
                expandedId = null; const rect = JSON.parse(card.getAttribute('data-origin')); const cardRect = card.getBoundingClientRect();
                card.style.transition = 'none'; card.style.top = (cardRect.top - frameRect.top) + 'px'; card.style.left = (cardRect.left - frameRect.left) + 'px'; card.style.width = cardRect.width + 'px'; card.style.height = cardRect.height + 'px'; card.offsetHeight; card.style.transition = ''; 
                gridContainer.classList.remove('grid-dimmed'); card.classList.remove('expanded'); card.classList.add('is-closing');
                card.style.top = rect.top + 'px'; card.style.left = rect.left + 'px'; card.style.width = rect.width + 'px'; card.style.height = rect.height + 'px';
                setTimeout(() => { if (expandedId === null) { card.style.transition = 'none'; card.style.position = 'relative'; card.style.top = 'auto'; card.style.left = 'auto'; card.style.width = '100%'; card.style.height = '100%'; card.classList.remove('is-closing'); card.classList.remove('flipped'); card.offsetHeight; card.style.transition = ''; if (markAsUsed) { usedCategories.add(id); card.classList.add('used'); } } }, 600);
            } else if (expandedId === null) {
                if (usedCategories.has(id)) return;
                expandedId = id; const cardRect = card.getBoundingClientRect();
                const origin = { top: cardRect.top - frameRect.top, left: cardRect.left - frameRect.left, width: cardRect.width, height: cardRect.height };
                card.setAttribute('data-origin', JSON.stringify(origin));
                card.style.transition = 'none'; card.style.position = 'absolute'; card.style.top = origin.top + 'px'; card.style.left = origin.left + 'px'; card.style.width = origin.width + 'px'; card.style.height = origin.height + 'px'; card.style.zIndex = '100'; card.offsetHeight; card.style.transition = ''; 
                gridContainer.classList.add('grid-dimmed'); card.classList.add('expanded');
                card.style.top = '0px'; card.style.left = '0px'; card.style.width = frameRect.width + 'px'; card.style.height = frameRect.height + 'px';
                setTimeout(() => { if (expandedId === id) { card.style.transition = 'none'; card.style.width = '100%'; card.style.height = '100%'; card.offsetHeight; card.style.transition = ''; playPling(); } }, 600);
            }
        }

        function initParticles() {
            const canvas = document.getElementById('particles-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
            function resize() { const viewport = document.getElementById('app-viewport'); canvas.width = viewport.clientWidth || window.innerWidth; canvas.height = viewport.clientHeight || window.innerHeight; }
            window.addEventListener('resize', resize); resize();
            const goldColors = ['rgba(191, 149, 63, 0.7)', 'rgba(252, 246, 186, 0.6)', 'rgba(179, 135, 40, 0.8)', 'rgba(250, 204, 21, 0.6)'];
            for(let i=0; i<100; i++) { particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 + 0.5, v: Math.random() * 0.1 + 0.02, a: Math.random() * Math.PI * 2, c: goldColors[Math.floor(Math.random() * goldColors.length)] }); }
            function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { ctx.fillStyle = p.c; p.y -= p.v; p.x += Math.sin(p.a) * 0.1; if(p.y < -10) p.y = canvas.height + 10; if(p.x < -10) p.x = canvas.width + 10; if(p.x > canvas.width + 10) p.x = -10; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(animate); }
            animate();
        }

        window.addEventListener('keydown', (e) => {
            const ae = document.activeElement; if (ae && (ae.isContentEditable || ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) { if (e.key === 'Escape') ae.blur(); return; }
            if (e.code === 'Space' && expandedId !== null) { e.preventDefault(); document.getElementById(`card-${expandedId}`).classList.toggle('flipped'); return; }
            if (expandedId === null) {
                if (e.key === 'ArrowRight' && currentSlide < 7) { if (currentSlide === 6) { morphCat6ToGrid(); } else { currentSlide++; updateSlide(); playPling(); } }
                if (e.key === 'ArrowLeft' && currentSlide > 0) { currentSlide--; updateSlide(); playPling(); }
            }
            const digitMatch = e.code.match(/^(Digit|Numpad)([1-6])$/);
            if (digitMatch) {
                const id = parseInt(digitMatch[2]);
                if (e.shiftKey && expandedId === null) { if (usedCategories.has(id)) { usedCategories.delete(id); document.getElementById(`card-${id}`).classList.remove('used'); } }
                else if (!e.shiftKey) { if (currentSlide === 7) toggleExpand(id, true); else { currentSlide = 7; updateSlide(); setTimeout(() => toggleExpand(id, true), 1050); } }
            }
            if ((e.key === 'Escape' || e.key === 'Backspace') && expandedId !== null) { toggleExpand(expandedId, false); }
            if (e.code === 'KeyR' && expandedId === null) { usedCategories.clear(); document.querySelectorAll('.category-card.used').forEach(c => c.classList.remove('used')); }
        });

        initSetup();
    </script>
</body>
</html>
